dataNotes:
  - pathA / Membrane 2 (bottom, numbered 1..16) = matrix rows R1..R16. pathB /
    Membrane 1 (top, lettered A..H) = matrix columns C0..C7. Every key has a
    unique (R,C) in ansi-matrix.json.
  - Numpad rows in the JSON were reserved so cells stay unique; confirm against
    your FFC before repairs.
  - 'Schematic: 102 US ANSI — one Enter (no key left of it); the "#" matrix cell
    in ansi-matrix.json is unused in the diagram. Backspace, backslash, and
    Enter share a common right edge in the alnum area.'
  - Schematic on-screen key positions and polylines are for navigation; not
    photo-accurate to the FFC shape.
